name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --copy-metadata imageio --copy-metadata imageio-ffmpeg --add-data "pet_frames;pet_frames" desktop_pet.py
      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-exe
          path: dist/desktop_pet.exe
